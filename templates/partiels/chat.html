<!-- Module de chat « L'Expert Internet » — unique, modifié ici seulement -->
<div class="carte-chat">
  <div class="barre">
    <div class="gauche">
      <div class="avatar"><span></span><span></span></div>
      <span class="nom">L'Expert Internet</span>
    </div>
    <span class="session">session sécurisée · IA spécialisée</span>
  </div>

  <div class="messages" data-chat-messages>
    <div class="message bot">
      <div class="bulle">Bonjour ! Je suis l'Expert Internet. Connexion, Wi-Fi, sécurité, email, QR code, VPN… posez-moi n'importe quelle question liée à Internet.</div>
    </div>
  </div>

  <div class="saisie">
    <div class="ligne-saisie">
      <input type="text" data-chat-input placeholder="Votre question sur Internet…">
      <button class="bouton-bleu" data-chat-send>Poser ma question</button>
    </div>
    <div class="puces">
      <button class="puce" data-chat-suggestion>Pourquoi ma connexion est-elle lente ?</button>
      <button class="puce" data-chat-suggestion>Comment scanner un QR code ?</button>
      <button class="puce" data-chat-suggestion>Mon email a-t-il été piraté ?</button>
      <button class="puce" data-chat-suggestion>À quoi sert un VPN ?</button>
      <button class="puce" data-chat-suggestion>C'est quoi un certificat SSL ?</button>
    </div>
    <p class="avertissement">⚠ Ne saisissez jamais de mots de passe, coordonnées bancaires ou informations sensibles dans vos échanges.</p>
  </div>
</div>
