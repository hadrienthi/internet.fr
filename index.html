  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    html, body { margin: 0; padding: 0; background: #FAF9F6; }\n    * { box-sizing: border-box; }\n    a { color: #2E5FD8; }\n    a:hover { color: #2450BC; }\n    @keyframes blink { 0%, 92%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.08); } }\n    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }\n    @keyframes antenna { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.75); } }\n    @keyframes dotpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }\n    @keyframes typedot { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }\n    ::placeholder { color: #A8A49B; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: #FAF9F6; color: #1C1B18; font-family: Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased;\">\n\n  <!-- ═══ Header (commun à toutes les vues) ═══ -->\n  <header data-screen-label=\"Header\" style=\"display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; padding: 28px 32px 0;\">\n    <div onclick=\"{{ goHome }}\" style=\"font-family: 'Spline Sans Mono', monospace; font-size: 15px; letter-spacing: 0.28em; font-weight: 500; cursor: pointer;\">INTERNET.FR<\u002Fdiv>\n    <nav style=\"display: flex; align-items: center; gap: 28px; font-size: 14px;\">\n      <a href=\"#expert\" onclick=\"{{ navExpert }}\" style=\"color: #1C1B18; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">L'Expert<\u002Fa>\n      <a href=\"#debit\" onclick=\"{{ navDebit }}\" style=\"color: #1C1B18; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">Test de débit<\u002Fa>\n      <a href=\"#dossiers\" onclick=\"{{ navDossiers }}\" style=\"color: #1C1B18; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">Dossiers<\u002Fa>\n      <a href=\"#questions\" onclick=\"{{ navQuestions }}\" style=\"color: #1C1B18; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">Questions<\u002Fa>\n      <span style=\"display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: #4C4A44; border: 1px solid #E4E1D8; border-radius: 99px; padding: 6px 13px; background: #FFFFFF;\">\n        <span style=\"width: 7px; height: 7px; border-radius: 50%; background: #2FA36B; animation: dotpulse 2.4s ease-in-out infinite;\"><\u002Fspan>\n        Expert en ligne\n      <\u002Fspan>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- ════════════════════════ VUE 1 : ACCUEIL ════════════════════════ -->\n  <sc-if value=\"{{ isAccueil }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"Accueil\">\n\n    <!-- Hero : titre + robot -->\n    <section style=\"max-width: 1100px; margin: 0 auto; padding: 64px 32px 12px; display: grid; grid-template-columns: 1fr 300px; gap: 48px; align-items: center;\">\n      <div style=\"display: flex; flex-direction: column; gap: 22px;\">\n        <h1 style=\"margin: 0; font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: 58px; line-height: 1.08; letter-spacing: -0.01em; text-wrap: balance;\">\n          Toutes vos questions sur Internet.<br>\n          <em style=\"font-style: italic; color: #2E5FD8;\">Une seule adresse.<\u002Fem>\n        <\u002Fh1>\n        <p style=\"margin: 0; font-size: 17px; line-height: 1.65; color: #4C4A44; max-width: 560px; text-wrap: pretty;\">\n          Connexion lente, Wi-Fi capricieux, email piraté, QR code, VPN, adresse IP&nbsp;: l'Expert Internet vous répond en langage clair, étape par étape, avec des solutions concrètes. Une IA spécialisée dans les technologies Internet, gratuite et sans inscription.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Robot géométrique -->\n      <div style=\"display: flex; justify-content: center; animation: float 5s ease-in-out infinite; animation-play-state: {{ animState }};\">\n        <div style=\"display: flex; flex-direction: column; align-items: center;\">\n          <div style=\"display: flex; flex-direction: column; align-items: center;\">\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: #2E5FD8; animation: antenna 2s ease-in-out infinite; animation-play-state: {{ animState }};\"><\u002Fdiv>\n            <div style=\"width: 3px; height: 22px; background: #1C1B18;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width: 150px; height: 118px; background: #1C1B18; border-radius: 34px; display: flex; align-items: center; justify-content: center; gap: 26px; box-shadow: 0 18px 40px -18px rgba(28,27,24,0.45);\">\n            <div style=\"width: 26px; height: 34px; border-radius: 13px; background: #FAF9F6; animation: blink 4.6s ease-in-out infinite; animation-play-state: {{ animState }};\"><\u002Fdiv>\n            <div style=\"width: 26px; height: 34px; border-radius: 13px; background: #FAF9F6; animation: blink 4.6s ease-in-out infinite 0.12s; animation-play-state: {{ animState }};\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width: 46px; height: 12px; background: #2E5FD8; border-radius: 0 0 10px 10px;\"><\u002Fdiv>\n          <div style=\"width: 108px; height: 64px; background: #FFFFFF; border: 2px solid #1C1B18; border-radius: 22px; margin-top: 6px; display: flex; align-items: center; justify-content: center;\">\n            <div style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: #2E5FD8;\">.FR<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width: 90px; height: 10px; border-radius: 50%; background: rgba(28,27,24,0.08); margin-top: 14px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- L'Expert Internet — le cœur du site -->\n    <section id=\"expert\" data-screen-label=\"Expert Internet\" style=\"max-width: 860px; margin: 0 auto; padding: 36px 32px 8px;\">\n      <div style=\"background: #FFFFFF; border: 1px solid #E4E1D8; border-radius: 20px; box-shadow: 0 24px 60px -36px rgba px 32px 24px;\">\n\n      <div style=\"display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 30px;\">\n        <a href=\"#\" onclick=\"{{ goHomeClick }}\" style=\"font-size: 13.5px; color: #4C4A44; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">← Accueil<\u002Fa>\n        <span style=\"color: #DAD6CB;\">/<\u002Fspan>\n        <span style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11.5px; color: #2E5FD8; background: #FFFFFF; border: 1px solid #E4E1D8; border-radius: 99px; padding: 5px 12px;\">internet.fr{{ themeSlug }}<\u002Fspan>\n        <sc-if value=\"{{ afficherVolumes }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11.5px; color: #8B877D; background: #F4F2EC; border-radius: 99px; padding: 5px 12px;\">{{ themeStat }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <h1 style=\"margin: 0 0 16px; font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-size: 52px; line-height: 1.08; letter-spacing: -0.01em;\">{{ themeTitre }}<\u002Fh1>\n      <p style=\"margin: 0 0 40px; font-size: 17px; line-height: 1.65; color: #4C4A44; max-width: 600px; text-wrap: pretty;\">{{ themeDesc }}<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 44px;\">\n        <sc-for list=\"{{ themeSujets }}\" as=\"suj\" hint-placeholder-count=\"4\">\n          <a href=\"#\" onclick=\"{{ suj.open }}\" style=\"display: flex; flex-direction: column; gap: 8px; padding: 22px; background: #FFFFFF; border: 1px solid #E4E1D8; border-radius: 14px; text-decoration: none; color: #1C1B18;\" style-hover=\"border: 1px solid #2E5FD8; box-shadow: 0 12px 28px -20px rgba(46,95,216,0.5);\">\n            <span style=\"font-family: 'Newsreader', Georgia, serif; font-size: 20px; font-weight: 500; line-height: 1.25;\">{{ suj.titre }}<\u002Fspan>\n            <span style=\"font-size: 14px; line-height: 1.5; color: #4C4A44; flex: 1;\">{{ suj.desc }}<\u002Fspan>\n            <span style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11px; color: {{ suj.tagColor }};\">{{ suj.tag }}<\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- CTA vers l'Expert -->\n      <div style=\"background: #2E5FD8; border-radius: 18px; padding: 26px 30px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; box-shadow: 0 24px 50px -30px rgba(46,95,216,0.7);\">\n        <div style=\"width: 62px; height: 48px; background: #1C1B18; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-shrink: 0;\">\n          <span style=\"width: 10px; height: 14px; border-radius: 5px; background: #FAF9F6; animation: blink 4.6s ease-in-out infinite; animation-play-state: {{ animState }};\"><\u002Fspan>\n          <span style=\"width: 10px; height: 14px; border-radius: 5px; background: #FAF9F6; animation: blink 4.6s ease-in-out infinite 0.12s; animation-play-state: {{ animState }};\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 4px;\">\n          <span style=\"font-family: 'Newsreader', Georgia, serif; font-size: 23px; font-weight: 500; color: #FFFFFF;\">Une question précise sur {{ themeTitreMinuscule }}&nbsp;?<\u002Fspan>\n          <span style=\"font-size: 14.5px; color: rgba(255,255,255,0.85);\">L'Expert Internet répond à toutes les variantes — même celles qui n'ont pas de page.<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ themeAsk }}\" style=\"font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 500; padding: 14px 24px; border: none; border-radius: 12px; background: #FFFFFF; color: #2E5FD8; cursor: pointer; white-space: nowrap;\" style-hover=\"background: #FAF9F6;\">Posez votre question en direct →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══ Footer (commun) ═══ -->\n  <footer data-screen-label=\"Footer\" style=\"max-width: 1100px; margin: 24px auto 0; padding: 26px 32px 36px; border-top: 1px solid #E9E6DD; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #8B877D;\">\n    <span style=\"font-family: 'Spline Sans Mono', monospace; letter-spacing: 0.2em; font-size: 12px;\">INTERNET.FR<\u002Fspan>\n    <div style=\"display: flex; gap: 22px;\">\n      <a href=\"#\" style=\"color: #8B877D; text-decoration: none;\" style-hover=\"color: #1C1B18;\">Mentions légales &amp; RGPD<\u002Fa>\n      <a href=\"#\" style=\"color: #8B877D; text-decoration: none;\" style-hover=\"color: #1C1B18;\">Cookies<\u002Fa>\n      <a href=\"#\" style=\"color: #8B877D; text-decoration: none;\" style-hover=\"color: #1C1B18;\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;debitMbps&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 487, &quot;min&quot;: 5, &quot;max&quot;: 2000, &quot;unit&quot;: &quot;Mbps&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Test de débit&quot; },\n  &quot;robotAnime&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Robot&quot; },\n  &quot;ctaVariante&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Bandeau&quot;, &quot;options&quot;: [&quot;Bandeau&quot;, &quot;Carte sticky&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Fiche FAQ&quot; },\n  &quot;afficherVolumes&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Fiche FAQ&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'accueil',   // 'accueil' | 'faq' | 'theme'\n    slug: null,\n    themeId: null,\n    draft: '',\n    typing: false,\n    debit: null,\n    messages: [\n      { role: 'bot', text: \"Bonjour ! Je suis l'Expert Internet. Connexion, Wi-Fi, sécurité, email, QR code, VPN… posez-moi n'importe quelle question liée à Internet.\" }\n    ]\n  };\n\n  fiches() {\n    return {\n      'pourquoi-mon-internet-est-lent': {\n        q: 'Pourquoi mon Internet est-il lent ?', theme: 'Débit & connexion', themeId: null, volume: '74 000 rech./mois',\n        courte: \"Dans 8 cas sur 10, la lenteur vient du Wi-Fi (distance, interférences) ou de la box — pas de votre ligne. Un test en filaire permet de trancher en 2 minutes.\",\n        steps: [\n          { titre: 'Testez en filaire ou près de la box', texte: \"Branchez un câble Ethernet ou rapprochez-vous à moins de 3 mètres de la box. Si le débit remonte nettement, le problème est le Wi-Fi, pas la connexion.\" },\n          { titre: 'Redémarrez la box 30 secondes', texte: \"Débranchez l'alimentation, attendez 30 secondes, rebranchez. Cela résout la plupart des ralentissements liés à la mémoire ou à la surchauffe de la box.\" },\n          { titre: \"Cherchez l'appareil qui consomme\", texte: \"Un téléchargement, une sauvegarde cloud ou une mise à jour de console peut saturer la ligne. Coupez les appareils un par un pour identifier le coupable.\" },\n          { titre: 'Comparez au débit de votre offre', texte: \"Lancez le test de débit d'Internet.fr et comparez le résultat au débit promis par votre abonnement. En dessous de 50 %, contactez votre opérateur.\" }\n        ],\n        liees: ['wifi-connecte-mais-pas-internet', 'comment-trouver-mon-adresse-ip', 'a-quoi-sert-un-vpn']\n      },\n      'mon-email-a-t-il-ete-pirate': {\n        q: 'Mon email a-t-il été piraté ?', theme: 'Email', themeId: 'email', volume: '41 000 rech./mois',\n        courte: \"Vérifiez si votre adresse figure dans une fuite de données connue, puis sécurisez le compte : mot de passe unique et double authentification. Ne saisissez jamais votre mot de passe ailleurs que sur le site officiel.\",\n        steps: [\n          { titre: 'Vérifiez les fuites de données', texte: \"Sur haveibeenpwned.com, entrez votre adresse email (jamais le mot de passe). Le site liste les fuites de données où elle apparaît.\" },\n          { titre: 'Changez le mot de passe immédiatement', texte: \"Depuis le site officiel de votre messagerie, choisissez un mot de passe long et unique, jamais réutilisé sur un autre service.\" },\n          { titre: 'Activez la double authentification', texte: \"Un code sur votre téléphone bloque 99 % des tentatives d'accès, même si le mot de passe a fuité.\" },\n          { titre: 'Inspectez règles et transferts', texte: \"Les pirates créent souvent une règle de transfert discrète vers leur adresse. Vérifiez les paramètres de votre boîte et supprimez tout transfert inconnu.\" }\n        ],\n        liees: ['pourquoi-mon-internet-est-lent', 'comment-scanner-un-qr-code', 'a-quoi-sert-un-vpn']\n      },\n      'comment-trouver-mon-adresse-ip': {\n        q: 'Comment trouver mon adresse IP ?', theme: 'Adresse IP', themeId: 'adresse-ip', volume: '33 000 rech./mois',\n        courte: \"Votre IP publique s'affiche en un clic — elle est déjà visible dans le test de débit d'Internet.fr. L'IP locale, elle, se trouve dans les paramètres réseau de votre appareil.\",\n        steps: [\n          { titre: 'IP publique : celle que voit Internet', texte: \"Attribuée par votre opérateur, c'est l'adresse vue par les sites web. Elle s'affiche directement dans le widget Test de débit d'Internet.fr.\" },\n          { titre: 'IP locale sur ordinateur', texte: \"Windows : Paramètres → Réseau et Internet → Propriétés. Mac : Réglages → Wi-Fi → Détails. Elle commence le plus souvent par 192.168.\" },\n          { titre: 'IP locale sur mobile', texte: \"iPhone comme Android : Réglages → Wi-Fi → touchez le réseau auquel vous êtes connecté. L'adresse IP apparaît dans les détails.\" },\n          { titre: 'IPv4 ou IPv6 : les deux sont normales', texte: \"92.174.13.58 est une IPv4 ; une forme longue avec des « : » est une IPv6. Les deux formats coexistent et fonctionnent en parallèle.\" }\n        ],\n        liees: ['pourquoi-mon-internet-est-lent', 'a-quoi-sert-un-vpn', 'wifi-connecte-mais-pas-internet']\n      },\n      'wifi-connecte-mais-pas-internet': {\n        q: \"Wi-Fi connecté mais pas d'accès Internet : que faire ?\", theme: 'Débit & connexion', themeId: null, volume: '27 000 rech./mois',\n        courte: \"Votre appareil parle bien à la box, mais la box n'accède plus au réseau. Le voyant « Internet » de la box dit presque tout.\",\n        steps: [\n          { titre: 'Regardez le voyant « Internet » de la box', texte: \"Vert ou blanc fixe : la ligne fonctionne, le problème vient de l'appareil. Rouge ou éteint : la box a perdu la connexion opérateur.\" },\n          { titre: 'Redémarrez la box 30 secondes', texte: \"Débranchez, patientez 30 secondes, rebranchez. Attendez 2 à 3 minutes que tous les voyants se stabilisent.\" },\n          { titre: 'Testez avec un autre appareil', texte: \"Si un second appareil accède à Internet, le problème est local : oubliez le réseau Wi-Fi sur l'appareil en panne, puis reconnectez-vous.\" },\n          { titre: \"Vérifiez l'état du réseau opérateur\", texte: \"Si le voyant reste rouge, consultez la page « état du réseau » de votre opérateur depuis votre mobile en 4G, ou appelez le service client.\" }\n        ],\n        liees: ['pourquoi-mon-internet-est-lent', 'comment-trouver-mon-adresse-ip', 'mon-email-a-t-il-ete-pirate']\n      },\n      'comment-scanner-un-qr-code': {\n        q: 'Comment scanner un QR code ?', theme: 'QR code', themeId: 'qr-code', volume: '90 500 rech./mois',\n        courte: \"Ouvrez simplement l'appareil photo de votre téléphone et visez le code : aucune application n'est nécessaire sur les téléphones récents.\",\n        steps: [\n          { titre: \"Ouvrez l'appareil photo\", texte: \"iPhone comme Android : cadrez le QR code avec l'appareil photo natif. Une notification apparaît en haut de l'écran — touchez-la.\" },\n          { titre: \"Rien ne s'affiche ? Activez l'option\", texte: \"Android : dans les réglages de l'appareil photo, activez « Scanner les QR codes ». Sinon, Google Lens fait le travail.\" },\n          { titre: \"Vérifiez l'URL avant d'ouvrir\", texte: \"Lisez le lien proposé dans la notification : le domaine juste avant le premier « / » doit correspondre au site attendu. Au moindre doute, ne l'ouvrez pas.\" },\n          { titre: 'Méfiez-vous des QR codes collés', texte: \"Sur les parkings ou les bornes, des fraudeurs collent leurs propres codes par-dessus les originaux (« quishing »). Un autocollant récent est un signal d'alerte.\" }\n        ],\n        liees: ['mon-email-a-t-il-ete-pirate', 'a-quoi-sert-un-vpn', 'pourquoi-mon-internet-est-lent']\n      },\n      'a-quoi-sert-un-vpn': {\n        q: 'À quoi sert un VPN ?', theme: 'VPN', themeId: 'vpn', volume: '60 000 rech./mois',\n        courte: \"Un VPN chiffre votre connexion et masque votre adresse IP. Utile sur les Wi-Fi publics et pour la confidentialité — mais il ne rend pas anonyme et ne remplace pas un antivirus.\",\n        steps: [\n          { titre: 'Chiffrer votre trafic', texte: \"Sur un Wi-Fi public (gare, hôtel, café), le VPN crée un tunnel chiffré : personne sur le réseau ne peut lire ce que vous envoyez.\" },\n          { titre: 'Masquer votre adresse IP', texte: \"Les sites voient l'adresse du serveur VPN, pas la vôtre. Votre localisation apparente change avec le serveur choisi.\" },\n          { titre: 'Connaître ses limites', texte: \"Un VPN ne bloque ni les virus, ni le phishing, ni les traqueurs des sites où vous êtes connecté. Ce n'est pas un outil d'anonymat absolu.\" },\n          { titre: 'Bien le choisir', texte: \"Privilégiez un fournisseur qui publie des audits indépendants de sa politique « zéro journal ». Gratuit sans modèle économique clair = vos données sont le produit.\" }\n        ],\n        liees: ['comment-trouver-mon-adresse-ip', 'mon-email-a-t-il-ete-pirate', 'pourquoi-mon-internet-est-lent']\n      }\n    };\n  }\n\n  themes() {\n    return {\n      'email': {\n        titre: 'Email', slug: '/email', stat: '620 questions couvertes',\n        desc: \"Piratage, spam, délivrabilité, configuration : le dossier complet pour comprendre et réparer votre messagerie, relié aux fiches détaillées et à l'Expert.\",\n        sujets: [\n          { titre: 'Mon email a-t-il été piraté ?', slug: 'mon-email-a-t-il-ete-pirate', desc: 'Fuites de données, mots de passe, double authentification.' },\n          { titre: 'Pourquoi mes emails arrivent en spam ?', slug: null, desc: 'Réputation, contenu, authentification des envois.' },\n          { titre: 'SPF, DKIM et DMARC expliqués', slug: null, desc: \"Les trois tampons d'authenticité de vos envois.\" },\n          { titre: 'Créer une adresse email professionnelle', slug: null, desc: 'Nom de domaine, hébergeur de messagerie, alias.' }\n        ]\n      },\n      'qr-code': {\n        titre: 'QR code', slug: '/qr-code', stat: '540 questions couvertes',\n        desc: \"Scanner, créer, vérifier : tout ce qu'il faut savoir sur les QR codes — y compris les arnaques par faux codes (« quishing »).\",\n        sujets: [\n          { titre: 'Comment scanner un QR code ?', slug: 'comment-scanner-un-qr-code', desc: \"Avec l'appareil photo natif, sans application.\" },\n          { titre: 'Créer un QR code gratuitement', slug: null, desc: 'Générateurs fiables, formats, impression.' },\n          { titre: 'Ce QR code est-il dangereux ?', slug: null, desc: \"Vérifier l'URL, repérer les codes collés par-dessus.\" },\n          { titre: 'Mon QR code ne fonctionne pas', slug: null, desc: 'Taille, contraste, lien expiré : le diagnostic.' }\n        ]\n      },\n      'vpn': {\n        titre: 'VPN', slug: '/vpn', stat: '480 questions couvertes',\n        desc: \"Chiffrement, confidentialité, choix d'un fournisseur : comprendre ce qu'un VPN fait vraiment — et ce qu'il ne fait pas.\",\n        sujets: [\n          { titre: 'À quoi sert un VPN ?', slug: 'a-quoi-sert-un-vpn', desc: 'Chiffrement, IP masquée, limites réelles.' },\n          { titre: 'Comment choisir son VPN ?', slug: null, desc: 'Audits, juridiction, vitesse, prix.' },\n          { titre: 'Les VPN gratuits sont-ils fiables ?', slug: null, desc: 'Modèle économique, revente de données.' },\n          { titre: 'Installer un VPN sur tous ses appareils', slug: null, desc: 'Ordinateur, mobile, box, téléviseur.' }\n        ]\n      },\n      'adresse-ip': {\n        titre: 'Adresse IP', slug: '/adresse-ip', stat: '410 questions couvertes',\n        desc: \"Publique ou locale, fixe ou dynamique, IPv4 ou IPv6 : le dossier pour comprendre l'adresse qui vous identifie sur le réseau.\",\n        sujets: [\n          { titre: 'Comment trouver mon adresse IP ?', slug: 'comment-trouver-mon-adresse-ip', desc: 'Publique, locale, sur ordinateur et mobile.' },\n          { titre: 'IP fixe ou dynamique : quelle différence ?', slug: null, desc: \"Attribution par l'opérateur, cas d'usage.\" },\n          { titre: 'Comment masquer mon adresse IP ?', slug: null, desc: 'VPN, proxy, ce qui est réellement caché.' },\n          { titre: 'IPv4 vs IPv6', slug: null, desc: 'Deux formats qui coexistent, pourquoi.' }\n        ]\n      }\n    };\n  }\n\n  go(view, extra) {\n    this.setState(Object.assign({ view }, extra || {}));\n    window.scrollTo({ top: 0 });\n  }\n\n  goFaq(slug) { this.go('faq', { slug }); }\n  goTheme(themeId) { this.go('theme', { themeId }); }\n\n  goHomePrefill(question) {\n    this.setState({ view: 'accueil', draft: question });\n    setTimeout(() => {\n      const el = document.getElementById('expert');\n      if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });\n    }, 80);\n  }\n\n  navTo(id) {\n    if (this.state.view !== 'accueil') {\n      this.setState({ view: 'accueil' });\n      setTimeout(() => {\n        const el = document.getElementById(id);\n        if (el) window.scrollTo({ top: el.offsetTop - 40 });\n      }, 80);\n    }\n  }\n\n  // ─── Chat (V1 conservé) ───\n  answers() {\n    return {\n      'lent': \"Trois causes fréquentes : le Wi-Fi (trop loin de la box, canal saturé), la box elle-même, ou une limitation de votre offre.\\n1. Testez en filaire ou près de la box.\\n2. Redémarrez la box 30 secondes.\\n3. Comparez le résultat du test de débit à votre abonnement.\\nDites-moi votre débit mesuré et je vous aide à interpréter.\",\n      'pirat': \"Vérifions ensemble. Votre adresse apparaît-elle dans une fuite de données connue ? Donnez-moi votre domaine de messagerie (jamais le mot de passe !) et je vous explique comment vérifier avec Have I Been Pwned, puis sécuriser votre compte : mot de passe unique + double authentification.\",\n      'qr': \"Ouvrez l'appareil photo de votre téléphone et visez le code : une notification apparaît. Avant d'ouvrir le lien, vérifiez que le domaine correspond bien au site attendu. Un QR code collé par-dessus un autre est un signal d'arnaque — décrivez-moi la situation et je vous guide.\",\n      'vpn': \"Un VPN chiffre votre connexion et masque votre IP : indispensable sur les Wi-Fi publics, utile pour la confidentialité. Mais il ne bloque ni virus ni phishing. Dites-moi votre usage (voyage, télétravail, streaming ?) et je vous aide à choisir.\",\n      'ip': \"Votre IP publique est visible dans le test de débit ci-dessous. Pour l'IP locale : Paramètres → Réseau sur ordinateur, Réglages → Wi-Fi sur mobile. Que cherchez-vous à faire avec cette adresse ? Je vous guide.\",\n      'wi-fi': \"Votre appareil est bien connecté à la box, mais la box n'accède plus au réseau.\\n1. Vérifiez le voyant « Internet » de votre box.\\n2. Redémarrez-la 30 secondes.\\n3. Si le voyant reste rouge, c'est probablement côté opérateur.\\nJe vous détaille chaque étape si besoin.\",\n      'ssl': \"Bonne nouvelle : même sans page dédiée, je maîtrise le sujet. Un certificat SSL/TLS chiffre les échanges entre votre navigateur et un site (le cadenas dans la barre d'adresse). Dites-moi ce que vous cherchez à faire — vérifier un site, installer un certificat, comprendre une erreur — et je vous guide pas à pas.\",\n      'heberg': \"Même sans page dédiée, je vous réponds volontiers. L'hébergement web, c'est l'ordinateur toujours allumé qui stocke votre site. Mutualisé, VPS, cloud : dites-moi votre projet et votre budget, je vous aide à choisir.\"\n    };\n  }\n\n  reply(text) {\n    this.setState({ typing: true });\n    clearTimeout(this._t1); clearInterval(this._t2);\n    this._t1 = setTimeout(() => {\n      this.setState(s => ({ typing: false, messages: [...s.messages, { role: 'bot', text: '' }] }));\n      let i = 0;\n      this._t2 = setInterval(() => {\n        i = Math.min(text.length, i + 3);\n        this.setState(s => {\n          const m = s.messages.slice();\n          m[m.length - 1] = { role: 'bot', text: text.slice(0, i) };\n          return { messages: m };\n        });\n        if (i >= text.length) clearInterval(this._t2);\n      }, 14);\n    }, 700);\n  }\n\n  ask(question) {\n    if (!question || !question.trim()) return;\n    this.setState(s => ({ draft: '', messages: [...s.messages, { role: 'user', text: question }] }));\n    const q = question.toLowerCase();\n    const dict = this.answers();\n    let text = null;\n    if (q.includes('mbps') || q.includes('normal')) {\n      const d = this.debitVal();\n      text = d + \" Mbps, c'est un très bon débit : la plupart des offres fibre délivrent entre 300 Mbps et 1 Gbps. Streaming 4K, visioconférence et jeux en ligne fonctionneront sans limite perceptible. Si votre offre annonce davantage, testez en filaire pour éliminer le Wi-Fi.\";\n    } else {\n      for (const k of ['ssl', 'heberg', 'lent', 'pirat', 'qr', 'vpn', 'wi-fi', 'ip']) {\n        if (q.includes(k)) { text = dict[k]; break; }\n      }\n    }\n    if (!text) text = \"Bonne question ! Dans la version finale, je m'appuie sur les 4 416 questions réelles collectées et une IA spécialisée pour vous répondre précisément, avec des étapes concrètes et des liens vers les pages dédiées d'Internet.fr.\";\n    this.reply(text);\n  }\n\n  debitVal() { return this.state.debit ?? (this.props.debitMbps ?? 487); }\n\n  componentWillUnmount() { clearTimeout(this._t1); clearInterval(this._t2); clearInterval(this._t3); }\n\n  relancer() {\n    clearInterval(this._t3);\n    let n = 0;\n    const target = this.props.debitMbps ?? 487;\n    this._t3 = setInterval(() => {\n      n += Math.ceil((target - n) / 6) + Math.floor(Math.random() * 30);\n      if (n >= target) { n = target; clearInterval(this._t3); }\n      this.setState({ debit: n });\n    }, 90);\n  }\n\n  prevent(fn) { return (e) => { if (e && e.preventDefault) e.preventDefault(); fn(); }; }\n\n  renderVals() {\n    const anime = this.props.robotAnime ?? true;\n    const afficherVolumes = this.props.afficherVolumes ?? true;\n    const ctaVariante = this.props.ctaVariante ?? 'Bandeau';\n    const FICHES = this.fiches();\n    const THEMES = this.themes();\n    const view = this.state.view;\n\n    // Fiche courante\n    const fiche = FICHES[this.state.slug] || FICHES['pourquoi-mon-internet-est-lent'];\n    const theme = THEMES[this.state.themeId] || THEMES['email'];\n\n    const cardFrom = (slug) => {\n      const f = FICHES[slug];\n      return { q: f.q, url: '/' + slug, theme: f.theme, open: this.prevent(() => this.goFaq(slug)) };\n    };\n\n    const debit = this.debitVal();\n    const sugLabels = [\n      'Pourquoi ma connexion est-elle lente ?',\n      'Comment scanner un QR code ?',\n      'Mon email a-t-il été piraté ?',\n      'À quoi sert un VPN ?',\n      \"C'est quoi un certificat SSL ?\"\n    ];\n\n    return {\n      // vues\n      isAccueil: view === 'accueil',\n      isFaq: view === 'faq',\n      isTheme: view === 'theme',\n      animState: anime ? 'running' : 'paused',\n      afficherVolumes,\n\n      // navigation\n      goHome: () => this.go('accueil'),\n      goHomeClick: this.prevent(() => this.go('accueil')),\n      navExpert: this.prevent(() => this.navTo('expert')),\n      navDebit: this.prevent(() => this.navTo('debit')),\n      navDossiers: this.prevent(() => this.navTo('dossiers')),\n      navQuestions: this.prevent(() => this.navTo('questions')),\n      askPointu: this.prevent(() => {\n        this.goHomePrefill(\"C'est quoi un certificat SSL ?\");\n      }),\n\n      // chat\n      typing: this.state.typing,\n      draft: this.state.draft,\n      messages: this.state.messages.map(m => ({\n        text: m.text,\n        justify: m.role === 'user' ? 'flex-end' : 'flex-start',\n        radius: m.role === 'user' ? '16px 16px 4px 16px' : '16px 16px 16px 4px',\n        bg: m.role === 'user' ? '#2E5FD8' : '#F4F2EC',\n        color: m.role === 'user' ? '#FFFFFF' : '#1C1B18'\n      })),\n      suggestions: sugLabels.map(label => ({ label, ask: () => this.ask(label) })),\n      onDraft: (e) => this.setState({ draft: e.target.value }),\n      onKey: (e) => { if (e.key === 'Enter') this.ask(this.state.draft); },\n      send: () => this.ask(this.state.draft),\n\n      // débit\n      debitAffiche: debit,\n      bridgeLabel: debit + ' Mbps, est-ce normal ? → Demander à l\\u2019Expert',\n      relancer: () => this.relancer(),\n      askDebit: () => {\n        this.ask(debit + ' Mbps en fibre, est-ce un bon débit ?');\n        const el = document.getElementById('expert');\n        if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });\n      },\n\n      // dossiers (accueil)\n      dossiers: Object.keys(THEMES).map(id => ({\n        titre: THEMES[id].titre,\n        slug: THEMES[id].slug,\n        stat: THEMES[id].stat,\n        open: this.prevent(() => this.goTheme(id))\n      })),\n\n      // grille maillage (accueil)\n      faqCards: Object.keys(FICHES).map(slug => cardFrom(slug)),\n\n      // fiche FAQ\n      ficheQ: fiche.q,\n      ficheUrl: '/' + (this.state.slug || 'pourquoi-mon-internet-est-lent'),\n      ficheTheme: fiche.theme,\n      ficheVolume: fiche.volume,\n      ficheCourte: fiche.courte,\n      ficheSteps: fiche.steps.map((s, i) => ({ num: String(i + 1), titre: s.titre, texte: s.texte })),\n      ficheLiees: fiche.liees.map(slug => cardFrom(slug)),\n      goFicheTheme: this.prevent(() => {\n        if (fiche.themeId) this.goTheme(fiche.themeId); else this.go('accueil');\n      }),\n      ctaBandeau: view === 'faq' && ctaVariante === 'Bandeau',\n      ctaSticky: view === 'faq' && ctaVariante === 'Carte sticky',\n      ctaAsk: this.prevent(() => this.goHomePrefill(fiche.q)),\n\n      // dossier thématique\n      themeTitre: theme.titre,\n      themeTitreMinuscule: theme.titre === 'Email' || theme.titre === 'Adresse IP' ? \"l'\" + theme.titre.toLowerCase() : 'le ' + theme.titre,\n      themeSlug: theme.slug,\n      themeStat: theme.stat,\n      themeDesc: theme.desc,\n      themeSujets: theme.sujets.map(s => ({\n        titre: s.titre,\n        desc: s.desc,\n        tag: s.slug ? '/' + s.slug : '→ via l\\u2019Expert (chat)',\n        tagColor: s.slug ? '#2E5FD8' : '#8B877D',\n        open: this.prevent(() => {\n          if (s.slug) this.goFaq(s.slug); else this.goHomePrefill(s.titre);\n        })\n      })),\n      themeAsk: this.prevent(() => this.goHomePrefill('Ma question sur ' + theme.titre.toLowerCase() + ' : '))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
