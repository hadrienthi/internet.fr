  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2Fbutton>\n      <a href=\"#expert\" onclick=\"{{ askDebit }}\" style=\"font-size: 12px; color: #2E5FD8; text-decoration: none;\" style-hover=\"color: #2450BC;\">Est-ce normal&nbsp;? →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ Header ═══ -->\n  <header data-screen-label=\"Header\" style=\"display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; padding: 30px 32px 0;\">\n    <a href=\"index.html\" style=\"font-family: 'Spline Sans Mono', monospace; font-size: 15px; letter-spacing: 0.28em; font-weight: 500; color: #1C1B18; text-decoration: none;\">INTERNET.FR<\u002Fa>\n    <nav style=\"display: flex; align-items: center; gap: 30px; font-size: 14px;\">\n      <a href=\"#expert\" style=\"color: #1C1B18; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">L'Expert<\u002Fa>\n      <a href=\"#dossiers\" style=\"color: #1C1B18; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">Dossiers<\u002Fa>\n      <a href=\"#questions\" style=\"color: #1C1B18; text-decoration: none;\" style-hover=\"color: #2E5FD8;\">Questions<\u002Fa>\n      <span style=\"display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: #4C4A44; border: 1px solid #E4E1D8; border-radius: 99px; padding: 6px 13px; background: #FFFFFF;\">\n        <span style=\"width: 7px; height: 7px; border-radius: 50%; background: #2FA36B; animation: dotpulse 2.4s ease-in-out infinite;\"><\u002Fspan>\n        Expert en ligne\n      <\u002Fspan>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- ═══ Hero ═══ -->\n  <section data-screen-label=\"Hero\" style=\"max-width: 1100px; margin: 0 auto; padding: 84px 32px 20px; display: grid; grid-template-columns: 1fr 300px; gap: 56px; align-items: center;\">\n    <div style=\"display: flex; flex-direction: column; gap: 26px;\">\n      <h1 style=\"margin: 0; font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; font-size: 68px; line-height: 1.04; letter-spacing: -0.015em; text-wrap: balance;\">\n        Toutes vos questions sur Internet.<br>\n        <em style=\"font-style: italic; color: #2E5FD8;\">Une seule adresse.<\u002Fem>\n      <\u002Fh1>\n      <p style=\"margin: 0; font-size: 17px; line-height: 1.7; color: #4C4A44; max-width: 540px; text-wrap: pretty;\">\n        Connexion lente, Wi-Fi capricieux, email piraté, QR code, VPN, adresse IP&nbsp;: l'Expert Internet vous répond en langage clair, étape par étape. Une IA spécialisée, gratuite et sans inscription.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Mascotte — signature graphique -->\n    <div style=\"display: flex; justify-content: center; animation: float 5s ease-in-out infinite; animation-play-state: {{ animState }};\">\n      <div style=\"display: flex; flex-direction: column; align-items: center;\">\n        <div style=\"display: flex; flex-direction: column; align-items: center;\">\n          <div style=\"width: 9px; height: 9px; border-radius: 50%; background: #2E5FD8; animation: antenna 2s ease-in-out infinite; animation-play-state: {{ animState }};\"><\u002Fdiv>\n          <div style=\"width: 2.5px; height: 20px; background: #1C1B18;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 148px; height: 114px; background: #1C1B18; border-radius: 36px; display: flex; align-items: center; justify-content: center; gap: 26px; box-shadow: 0 30px 60px -28px rgba(28,27,24,0.4);\">\n          <div style=\"width: 24px; height: 32px; border-radius: 12px; background: #FAF9F6; animation: blink 4.6s ease-in-out infinite; animation-play-state: {{ animState }};\"><\u002Fdiv>\n          <div style=\"width: 24px; height: 32px; border-radius: 12px; background: #FAF9F6; animation: blink 4.6s ease-in-out infinite 0.12s; animation-play-state: {{ animState }};\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 44px; height: 11px; background: #2E5FD8; border-radius: 0 0 10px 10px;\"><\u002Fdiv>\n        <div style=\"width: 104px; height: 60px; background: #FFFFFF; border: 1.5px solid #1C1B18; border-radius: 22px; margin-top: 7px; display: flex; align-items: center; justify-content: center; box-shadow: 0 16px 36px -22px rgba(28,27,24,0.3);\">\n          <div style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11px; letter-spacing: 0.16em; color: #2E5FD8;\">.FR<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 88px; height: 9px; border-radius: 50%; background: rgba(28,27,24,0.07); margin-top: 15px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ L'Expert Internet ═══ -->\n  <section id=\"expert\" data-screen-label=\"Expert Internet\" style=\"max-width: 860px; margin: 0 auto; padding: 44px 32px 8px;\">\n    <div style=\"background: #FFFFFF; border: 1px solid #E9E6DD; border-radius: 24px; box-shadow: 0 40px 90px -50px rgba(28,27,24,0.3); overflow: hidden;\">\n\n      <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 18px 26px; border-bottom: 1px solid #F1EFE8;\">\n        <div style=\"display: flex; align-items: center; gap: 11px;\">\n          <div style=\"width: 30px; height: 24px; background: #1C1B18; border-radius: 9px; display: flex; align-items: center; justify-content: center; gap: 5px;\">\n            <span style=\"width: 5px; height: 7px; border-radius: 3px; background: #FAF9F6;\"><\u002Fspan>\n            <span style=\"width: 5px; height: 7px; border-radius: 3px; background: #FAF9F6;\"><\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-family: 'Instrument Serif', Georgia, serif; font-size: 21px;\">L'Expert Internet<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11px; color: #8B877D;\">session sécurisée · IA spécialisée<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"padding: 26px; display: flex; flex-direction: column; gap: 16px; min-height: 190px;\">\n        <sc-for list=\"{{ messages }}\" as=\"msg\" hint-placeholder-count=\"1\">\n          <div style=\"display: flex; justify-content: {{ msg.justify }}; animation: fadeup 0.35s ease both;\">\n            <div style=\"max-width: 76%; padding: 13px 18px; font-size: 15px; line-height: 1.65; border-radius: {{ msg.radius }}; background: {{ msg.bg }}; color: {{ msg.color }}; white-space: pre-line;\">{{ msg.text }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; animation: fadeup 0.3s ease both;\">\n            <div style=\"padding: 15px 18px; border-radius: 18px 18px 18px 5px; background: #F4F2EC; display: flex; gap: 5px; align-items: center;\">\n              <span style=\"width: 6px; height: 6px; border-radius: 50%; background: #8B877D; animation: typedot 1.2s infinite;\"><\u002Fspan>\n              <span style=\"width: 6px; height: 6px; border-radius: 50%; background: #8B877D; animation: typedot 1.2s infinite 0.15s;\"><\u002Fspan>\n              <span style=\"width: 6px; height: 6px; border-radius: 50%; background: #8B877D; animation: typedot 1.2s infinite 0.3s;\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"padding: 0 26px 22px; display: flex; flex-direction: column; gap: 14px;\">\n        <div style=\"display: flex; gap: 10px;\">\n          <input ref=\"{{ inputRef }}\" value=\"{{ draft }}\" onchange=\"{{ onDraft }}\" onkeydown=\"{{ onKey }}\" placeholder=\"Votre question sur Internet…\" style=\"flex: 1; font-family: 'Inter', Helvetica, sans-serif; font-size: 15.5px; padding: 15px 18px; border: 1.5px solid #DAD6CB; border-radius: 13px; background: #FCFBF8; color: #1C1B18; outline: none; transition: border-color 0.2s ease, background 0.2s ease;\" style-focus=\"border: 1.5px solid #2E5FD8; background: #FFFFFF;\">\n          <button onclick=\"{{ send }}\" style=\"font-family: 'Inter', Helvetica, sans-serif; font-size: 15px; font-weight: 500; padding: 0 26px; border: none; border-radius: 13px; background: #2E5FD8; color: #FFFFFF; cursor: pointer; transition: background 0.2s ease;\" style-hover=\"background: #2450BC;\">Poser ma question<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n          <sc-for list=\"{{ suggestions }}\" as=\"sug\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ sug.ask }}\" style=\"font-family: 'Inter', Helvetica, sans-serif; font-size: 13.5px; padding: 8px 15px; border: 1px solid #E4E1D8; border-radius: 99px; background: #FFFFFF; color: #4C4A44; cursor: pointer; transition: all 0.2s ease;\" style-hover=\"border: 1px solid #2E5FD8; color: #2E5FD8;\">{{ sug.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"margin: 0; font-size: 12.5px; color: #A8A49B;\">⚠ Ne saisissez jamais de mots de passe, coordonnées bancaires ou informations sensibles dans vos échanges.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ Dossiers thématiques ═══ -->\n  <section id=\"dossiers\" data-screen-label=\"Dossiers\" style=\"max-width: 860px; margin: 0 auto; padding: 80px 32px 8px;\">\n    <h2 style=\"margin: 0 0 10px; font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; font-size: 38px;\">Les grands dossiers<\u002Fh2>\n    <p style=\"margin: 0 0 30px; font-size: 15px; line-height: 1.65; color: #4C4A44; max-width: 560px;\">Quatre sujets concentrent l'essentiel des recherches. Chacun a sa page dédiée&nbsp;: un guide complet, relié aux fiches et à l'Expert.<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;\">\n      <sc-for list=\"{{ dossiers }}\" as=\"dos\" hint-placeholder-count=\"4\">\n        <a href=\"template-hub.html?t={{ dos.id }}\" data-slug=\"{{ dos.id }}\" style=\"display: flex; flex-direction: column; gap: 8px; padding: 24px 20px; background: #FFFFFF; border: 1px solid #E9E6DD; border-radius: 16px; text-decoration: none; color: #1C1B18; transition: all 0.25s ease;\" style-hover=\"border: 1px solid #2E5FD8; transform: translateY(-2px); box-shadow: 0 18px 36px -22px rgba(46,95,216,0.45);\">\n          <span style=\"font-family: 'Instrument Serif', Georgia, serif; font-size: 23px;\">{{ dos.titre }}<\u002Fspan>\n          <span style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11px; color: #2E5FD8;\">{{ dos.slug }}<\u002Fspan>\n          <span style=\"font-size: 12.5px; color: #8B877D;\">{{ dos.stat }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ Grille de maillage interne ═══ -->\n  <section id=\"questions\" data-screen-label=\"Questions\" style=\"max-width: 860px; margin: 0 auto; padding: 64px 32px 32px;\">\n    <h2 style=\"margin: 0 0 10px; font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; font-size: 38px;\">Les questions les plus posées<\u002Fh2>\n    <p style=\"margin: 0 0 30px; font-size: 15px; line-height: 1.65; color: #4C4A44; max-width: 560px;\">4&nbsp;416 questions d'internautes analysées. Les 100 plus fréquentes ont chacune leur page dédiée, reliée à l'Expert.<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;\">\n      <sc-for list=\"{{ faqCards }}\" as=\"card\" hint-placeholder-count=\"6\">\n        <a href=\"template-question.html?q={{ card.slug }}\" data-slug=\"{{ card.slug }}\" style=\"display: flex; flex-direction: column; gap: 10px; padding: 22px; background: #FFFFFF; border: 1px solid #E9E6DD; border-radius: 16px; text-decoration: none; color: #1C1B18; transition: all 0.25s ease;\" style-hover=\"border: 1px solid #2E5FD8; transform: translateY(-2px); box-shadow: 0 18px 36px -22px rgba(46,95,216,0.45);\">\n          <span style=\"font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #A8A49B;\">{{ card.theme }}<\u002Fspan>\n          <span style=\"font-family: 'Instrument Serif', Georgia, serif; font-size: 20px; line-height: 1.25; flex: 1;\">{{ card.q }}<\u002Fspan>\n          <span style=\"font-family: 'Spline Sans Mono', monospace; font-size: 11px; color: #2E5FD8;\">{{ card.url }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"margin: 26px 0 0; font-size: 13.5px; color: #8B877D;\">Sujets pointus (SSL, hébergement web, WHOIS, DNS avancé…)&nbsp;: pas de page ni d'outil dédié — <a href=\"#expert\" onclick=\"{{ askPointu }}\" style=\"color: #2E5FD8;\">l'Expert les résout en langage naturel<\u002Fa>.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ═══ Footer ═══ -->\n  <footer data-screen-label=\"Footer\" style=\"max-width: 1100px; margin: 40px auto 0; padding: 28px 32px 40px; border-top: 1px solid #EFEDE6; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #8B877D;\">\n    <span style=\"font-family: 'Spline Sans Mono', monospace; letter-spacing: 0.2em; font-size: 12px;\">INTERNET.FR<\u002Fspan>\n    <div style=\"display: flex; gap: 22px;\">\n      <a href=\"#\" style=\"color: #8B877D; text-decoration: none;\" style-hover=\"color: #1C1B18;\">Mentions légales &amp; RGPD<\u002Fa>\n      <a href=\"#\" style=\"color: #8B877D; text-decoration: none;\" style-hover=\"color: #1C1B18;\">Cookies<\u002Fa>\n      <a href=\"#\" style=\"color: #8B877D; text-decoration: none;\" style-hover=\"color: #1C1B18;\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;debitMbps&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 487, &quot;min&quot;: 5, &quot;max&quot;: 2000, &quot;unit&quot;: &quot;Mbps&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Bandeau réseau&quot; },\n  &quot;robotAnime&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Mascotte&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    fiches: null,\n    themes: null,\n    draft: '',\n    typing: false,\n    debit: null,\n    messages: [\n      { role: 'bot', text: \"Bonjour ! Je suis l'Expert Internet. Connexion, Wi-Fi, sécurité, email, QR code, VPN… posez-moi n'importe quelle question liée à Internet.\" }\n    ]\n  };\n\n  constructor(props) {\n    super(props);\n    this._inputRef = React.createRef();\n  }\n\n  async componentDidMount() {\n    // Le test de débit (débit, IP, FAI) est la seule API réelle : mesure au chargement.\n    this.relancer();\n\n    const mod = await import((window.__resources && window.__resources.dataJs) ? window.__resources.dataJs : './data.js');\n    this.setState({ fiches: mod.FICHES, themes: mod.THEMES });\n\n    // ── Tunnel SEO : ?q= → injection dans le chat + scroll fluide + focus ──\n    const q = new URLSearchParams(window.location.search).get('q');\n    if (q) {\n      const fiche = mod.FICHES[q];\n      const question = fiche ? fiche.q : decodeURIComponent(q).replace(/-/g, ' ');\n      const goExpert = (behavior) => {\n        const el = document.getElementById('expert');\n        if (el) window.scrollTo({ top: el.offsetTop - 40, behavior });\n        if (this._inputRef.current) this._inputRef.current.focus({ preventScroll: true });\n      };\n      setTimeout(() => {\n        goExpert('smooth');\n        this.ask(question);\n        // un rendu ultérieur peut réinitialiser le scroll : on ré-applique\n        setTimeout(() => goExpert('auto'), 600);\n        setTimeout(() => goExpert('auto'), 1400);\n      }, 400);\n    }\n  }\n\n  answers() {\n    return {\n      'lent': \"Trois causes fréquentes : le Wi-Fi (trop loin de la box, canal saturé), la box elle-même, ou une limitation de votre offre.\\n1. Testez en filaire ou près de la box.\\n2. Redémarrez la box 30 secondes.\\n3. Comparez le résultat du bandeau réseau (en haut de page) à votre abonnement.\\nDites-moi votre débit mesuré et je vous aide à interpréter.\",\n      'pirat': \"Vérifions ensemble. Votre adresse apparaît-elle dans une fuite de données connue ? Donnez-moi votre domaine de messagerie (jamais le mot de passe !) et je vous explique comment vérifier avec Have I Been Pwned, puis sécuriser votre compte : mot de passe unique + double authentification.\",\n      'qr': \"Ouvrez l'appareil photo de votre téléphone et visez le code : une notification apparaît. Avant d'ouvrir le lien, vérifiez que le domaine correspond bien au site attendu. Un QR code collé par-dessus un autre est un signal d'arnaque — décrivez-moi la situation et je vous guide.\",\n      'vpn': \"Un VPN chiffre votre connexion et masque votre IP : indispensable sur les Wi-Fi publics, utile pour la confidentialité. Mais il ne bloque ni virus ni phishing. Dites-moi votre usage (voyage, télétravail, streaming ?) et je vous aide à choisir.\",\n      'domaine': \"Pas besoin d'outil WHOIS ici : je vous explique directement. Chaque domaine a une fiche publique (titulaire — souvent masqué pour les particuliers en France —, bureau d'enregistrement, dates). Donnez-moi le domaine qui vous intéresse et je vous dis comment lire sa fiche, en langage clair.\",\n      'ip': \"Votre IP publique est affichée dans le bandeau réseau, tout en haut de la page. Pour l'IP locale : Paramètres → Réseau sur ordinateur, Réglages → Wi-Fi sur mobile. Que cherchez-vous à faire avec cette adresse ? Je vous guide.\",\n      'wi-fi': \"Votre appareil est bien connecté à la box, mais la box n'accède plus au réseau.\\n1. Vérifiez le voyant « Internet » de votre box.\\n2. Redémarrez-la 30 secondes.\\n3. Si le voyant reste rouge, c'est probablement côté opérateur.\\nJe vous détaille chaque étape si besoin.\",\n      'ssl': \"Bonne nouvelle : même sans page dédiée, je maîtrise le sujet. Un certificat SSL/TLS chiffre les échanges entre votre navigateur et un site (le cadenas dans la barre d'adresse). Dites-moi ce que vous cherchez à faire — vérifier un site, installer un certificat, comprendre une erreur — et je vous guide pas à pas.\",\n      'heberg': \"Même sans page dédiée, je vous réponds volontiers. L'hébergement web, c'est l'ordinateur toujours allumé qui stocke votre site. Mutualisé, VPS, cloud : dites-moi votre projet et votre budget, je vous aide à choisir.\"\n    };\n  }\n\n  reply(text) {\n    this.setState({ typing: true });\n    clearTimeout(this._t1); clearInterval(this._t2);\n    this._t1 = setTimeout(() => {\n      this.setState(s => ({ typing: false, messages: [...s.messages, { role: 'bot', text: '' }] }));\n      let i = 0;\n      this._t2 = setInterval(() => {\n        i = Math.min(text.length, i + 3);\n        this.setState(s => {\n          const m = s.messages.slice();\n          m[m.length - 1] = { role: 'bot', text: text.slice(0, i) };\n          return { messages: m };\n        });\n        if (i >= text.length) clearInterval(this._t2);\n      }, 14);\n    }, 700);\n  }\n\n  ask(question) {\n    if (!question || !question.trim()) return;\n    this.setState(s => ({ draft: '', messages: [...s.messages, { role: 'user', text: question }] }));\n    const q = question.toLowerCase();\n    const dict = this.answers();\n    let text = null;\n    if (q.includes('mbps') || q.includes('normal')) {\n      const d = this.debitVal();\n      text = d + \" Mbps, c'est un très bon débit : la plupart des offres fibre délivrent entre 300 Mbps et 1 Gbps. Streaming 4K, visioconférence et jeux en ligne fonctionneront sans limite perceptible. Si votre offre annonce davantage, testez en filaire pour éliminer le Wi-Fi.\";\n    } else {\n      for (const k of ['ssl', 'heberg', 'domaine', 'lent', 'pirat', 'qr', 'vpn', 'wi-fi', 'ip']) {\n        if (q.includes(k)) { text = dict[k]; break; }\n      }\n    }\n    if (!text) text = \"Bonne question ! Dans la version finale, je m'appuie sur les 4 416 questions réelles collectées et une IA spécialisée pour vous répondre précisément, avec des étapes concrètes et des liens vers les pages dédiées d'Internet.fr.\";\n    this.reply(text);\n  }\n\n  debitVal() { return this.state.debit ?? (this.props.debitMbps ?? 487); }\n\n  componentWillUnmount() { clearTimeout(this._t1); clearInterval(this._t2); clearInterval(this._t3); }\n\n  relancer() {\n    clearInterval(this._t3);\n    let n = 0;\n    const target = this.props.debitMbps ?? 487;\n    this._t3 = setInterval(() => {\n      n += Math.ceil((target - n) / 6) + Math.floor(Math.random() * 30);\n      if (n >= target) { n = target; clearInterval(this._t3); }\n      this.setState({ debit: n });\n    }, 90);\n  }\n\n  renderVals() {\n    const anime = this.props.robotAnime ?? true;\n    const FICHES = this.state.fiches || {};\n    const THEMES = this.state.themes || {};\n    const debit = this.debitVal();\n    const sugLabels = [\n      'Pourquoi ma connexion est-elle lente ?',\n      'Comment scanner un QR code ?',\n      'Mon email a-t-il été piraté ?',\n      'À quoi sert un VPN ?',\n      \"C'est quoi un certificat SSL ?\"\n    ];\n\n    return {\n      animState: anime ? 'running' : 'paused',\n      inputRef: this._inputRef,\n      typing: this.state.typing,\n      draft: this.state.draft,\n      messages: this.state.messages.map(m => ({\n        text: m.text,\n        justify: m.role === 'user' ? 'flex-end' : 'flex-start',\n        radius: m.role === 'user' ? '18px 18px 5px 18px' : '18px 18px 18px 5px',\n        bg: m.role === 'user' ? '#2E5FD8' : '#F4F2EC',\n        color: m.role === 'user' ? '#FFFFFF' : '#1C1B18'\n      })),\n      suggestions: sugLabels.map(label => ({ label, ask: () => this.ask(label) })),\n      onDraft: (e) => this.setState({ draft: e.target.value }),\n      onKey: (e) => { if (e.key === 'Enter') this.ask(this.state.draft); },\n      send: () => this.ask(this.state.draft),\n      askPointu: (e) => {\n        e.preventDefault();\n        this.setState({ draft: \"C'est quoi un certificat SSL ?\" });\n        const el = document.getElementById('expert');\n        if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });\n        if (this._inputRef.current) this._inputRef.current.focus({ preventScroll: true });\n      },\n\n      debitAffiche: debit,\n      relancer: () => this.relancer(),\n      askDebit: (e) => {\n        if (e && e.preventDefault) e.preventDefault();\n        this.ask(debit + ' Mbps en fibre, est-ce un bon débit ?');\n        const el = document.getElementById('expert');\n        if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });\n      },\n\n      dossiers: Object.keys(THEMES).map(id => ({\n        id,\n        titre: THEMES[id].titre,\n        slug: THEMES[id].slug,\n        stat: THEMES[id].stat\n      })),\n\n      faqCards: Object.keys(FICHES).map(slug => ({\n        slug,\n        q: FICHES[slug].q,\n        url: '/' + slug,\n        theme: FICHES[slug].theme\n      }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
